{% extends 'base.html' %}

{% block title %}Edição de anúncio{% endblock %}

{% block content %}

<h2>Editar Anúncio</h2>

<form action="{% url 'editar-anuncio' anuncio.pk %}" method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="row">
        <div class="col-6">
            <label>Título</label>
            {{ form.titulo }}
        </div>

        <div class="col-6">
            <label>Valor</label>
            {{ form.valor }}
        </div>

        <div class="col-12">
            <label>Descrição</label>
            {{ form.descricao }}
        </div>

        <div class="col-6 mt-2">
            <label>Veículo Associado</label>
            {{ form.veiculo }}
        </div>
    </div>

    <br>

    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
</form>

{% endblock %}
